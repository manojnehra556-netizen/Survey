<!DOCTYPE html><html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>सरल टैक्सी सर्विस</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    .container {
      max-width: 500px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background: #e9ffe9;
      border: 1px solid #28a745;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>
<body><header>🚖 सरल टैक्सी सर्विस</header><div class="container">
  <h3>बुकिंग फॉर्म</h3>  <input type="text" id="name" placeholder="आपका नाम" required>
  <input type="tel" id="phone" placeholder="मोबाइल नंबर" required>
  <input type="text" id="pickup" placeholder="पिकअप लोकेशन" required>
  <input type="text" id="drop" placeholder="ड्रॉप लोकेशन" required>  <select id="car">
    <option value="Mini">Mini (₹10/km)</option>
    <option value="Sedan">Sedan (₹15/km)</option>
    <option value="SUV">SUV (₹20/km)</option>
  </select><button onclick="bookTaxi()">बुक करें</button>

  <div class="result" id="result"></div>
</div><script>
function bookTaxi() {
  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;
  let pickup = document.getElementById('pickup').value;
  let drop = document.getElementById('drop').value;
  let car = document.getElementById('car').value;

  if (!name || !phone || !pickup || !drop) {
    alert("सभी जानकारी भरें");
    return;
  }

  let bookingId = "TX" + Math.floor(Math.random() * 100000);

  let resultBox = document.getElementById('result');
  resultBox.style.display = 'block';
  resultBox.innerHTML = `
    <b>बुकिंग सफल ✅</b><br>
    बुकिंग ID: ${bookingId}<br>
    नाम: ${name}<br>
    कार: ${car}<br>
    पिकअप: ${pickup}<br>
    ड्रॉप: ${drop}<br>
    ड्राइवर आपको जल्द कॉल करेगा 📞
  `;
}
</script></body>
</html>
